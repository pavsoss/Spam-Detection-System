name: Contributor Greeting (Existing Users Only)

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Check user contribution history & comment
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.actor;

            // Search previous issues + PRs by this user in repo
            const result = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} author:${username}`
            });

            const totalContributions = result.data.total_count;

            console.log("User:", username);
            console.log("Total contributions:", totalContributions);

            // Skip new users (only proceed if NOT first-time contributor)
            if (totalContributions <= 1) {
              console.log("New user detected — skipping greeting.");
              return;
            }

            const message = "👋 Welcome back! Thanks for your continued contribution. Your issue/PR is received and waiting for maintainer review.";

            if (context.eventName === "issues") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message
              });
            } else if (context.eventName === "pull_request") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message
              });
            }
