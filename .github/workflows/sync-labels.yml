name: Sync Labels from Issue

on:
  pull_request_target:
    types:
      - opened
      - edited

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: read

    steps:
      - name: Copy labels from linked issues
        uses: michalvankodev/copy-issue-labels@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
