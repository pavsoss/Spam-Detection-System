name: 📖 Documentation Update
description: Suggest improvements to the documentation.
title: "[Docs]: "
labels: ["documentation"]

body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation Issue
      placeholder: Describe the documentation issue...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Update
      placeholder: What should be changed?
