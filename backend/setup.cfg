[flake8]
# This codebase has never been linted before: full PEP8 style has ~700+
# violations (line length, blank-line spacing) and the broader F-series
# (unused imports, etc.) has ~75 more, none related to correctness. CI
# enforces only the subset that indicates an actual bug (syntax errors,
# undefined names) as a hard gate; the rest is left for a dedicated
# follow-up cleanup rather than blocking every PR.
select = E9,F63,F7,F82
exclude = node_modules,__pycache__,.venv,venv,output
